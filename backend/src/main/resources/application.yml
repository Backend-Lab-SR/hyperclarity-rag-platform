spring:
  application:
    name: hyperclarity-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/hyperclarity?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:hyperclarity}
    password: ${DB_PASSWORD:hyperclarity}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  servlet:
    multipart:
      enabled: true
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:25MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:25MB}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.hyperclarity: DEBUG
